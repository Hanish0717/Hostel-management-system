



<style>
.room-admin-section {
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    padding: 30px;
    border-radius: 12px;
    color: white;
    margin: 20px 0;
}

.room-stats-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 20px;
    margin: 20px 0;
}

.room-stat-card {
    background: rgba(255, 255, 255, 0.15);
    padding: 20px;
    border-radius: 10px;
    text-align: center;
    backdrop-filter: blur(10px);
}

.room-stat-number {
    font-size: 36px;
    font-weight: bold;
    margin: 10px 0;
}

.room-stat-label {
    font-size: 12px;
    opacity: 0.9;
    text-transform: uppercase;
}

.room-form-section {
    background: rgba(255, 255, 255, 0.1);
    padding: 20px;
    border-radius: 10px;
    margin: 20px 0;
    border: 2px dashed rgba(255, 255, 255, 0.3);
}

.room-form-group {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 15px;
    margin-bottom: 15px;
}

.room-form-group.full {
    grid-template-columns: 1fr;
}

.room-form-group label {
    display: block;
    font-size: 12px;
    margin-bottom: 5px;
    opacity: 0.9;
    text-transform: uppercase;
}

.room-form-group input,
.room-form-group select {
    padding: 10px;
    border: none;
    border-radius: 6px;
    background: rgba(255, 255, 255, 0.1);
    color: white;
    border: 1px solid rgba(255, 255, 255, 0.2);
}

.room-form-group input::placeholder {
    color: rgba(255, 255, 255, 0.6);
}

.room-form-group select option {
    background: #333;
    color: white;
}

.room-form-actions {
    display: flex;
    gap: 10px;
}

.room-btn {
    flex: 1;
    padding: 12px;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    font-weight: bold;
    transition: all 0.3s;
}

.room-btn-primary {
    background: #10b981;
    color: white;
}

.room-btn-primary:hover {
    background: #059669;
}

.room-btn-secondary {
    background: rgba(255, 255, 255, 0.2);
    color: white;
    border: 1px solid rgba(255, 255, 255, 0.3);
}

.room-btn-secondary:hover {
    background: rgba(255, 255, 255, 0.3);
}

.room-list-section {
    margin: 20px 0;
}

.room-cards-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
    gap: 20px;
    margin: 20px 0;
}

.room-card {
    background: rgba(255, 255, 255, 0.1);
    border: 1px solid rgba(255, 255, 255, 0.2);
    padding: 20px;
    border-radius: 10px;
    backdrop-filter: blur(10px);
    transition: all 0.3s;
}

.room-card:hover {
    background: rgba(255, 255, 255, 0.15);
    transform: translateY(-5px);
}

.room-number {
    font-size: 24px;
    font-weight: bold;
    margin-bottom: 10px;
}

.room-block {
    display: inline-block;
    background: rgba(16, 185, 129, 0.3);
    padding: 6px 12px;
    border-radius: 20px;
    font-size: 12px;
    margin-bottom: 15px;
}

.room-capacity-bar {
    background: rgba(255, 255, 255, 0.1);
    height: 8px;
    border-radius: 4px;
    margin: 10px 0;
    overflow: hidden;
}

.room-capacity-fill {
    height: 100%;
    background: linear-gradient(90deg, #10b981, #f59e0b);
    transition: width 0.3s;
}

.room-capacity-text {
    font-size: 12px;
    margin: 8px 0;
    opacity: 0.9;
}

.room-card-actions {
    display: flex;
    gap: 8px;
    margin-top: 15px;
}

.room-card-action-btn {
    flex: 1;
    padding: 8px;
    border: none;
    border-radius: 4px;
    cursor: pointer;
    font-size: 12px;
    font-weight: bold;
    background: rgba(255, 255, 255, 0.2);
    color: white;
    transition: background 0.3s;
}

.room-card-action-btn:hover {
    background: rgba(255, 255, 255, 0.3);
}

.room-message {
    padding: 15px;
    border-radius: 8px;
    margin: 15px 0;
}

.room-message.success {
    background: rgba(16, 185, 129, 0.2);
    border: 1px solid #10b981;
    color: #10b981;
}

.room-message.error {
    background: rgba(239, 68, 68, 0.2);
    border: 1px solid #ef4444;
    color: #ef4444;
}

.room-table {
    width: 100%;
    background: rgba(255, 255, 255, 0.05);
    border-collapse: collapse;
    border-radius: 8px;
    overflow: hidden;
    margin: 20px 0;
}

.room-table thead {
    background: rgba(255, 255, 255, 0.1);
}

.room-table th,
.room-table td {
    padding: 12px;
    text-align: left;
    border-bottom: 1px solid rgba(255, 255, 255, 0.1);
}

.tabs-room {
    display: flex;
    gap: 10px;
    margin: 20px 0;
    border-bottom: 2px solid rgba(255, 255, 255, 0.1);
}

.tab-room {
    padding: 10px 20px;
    background: transparent;
    color: white;
    border: none;
    cursor: pointer;
    font-weight: bold;
    opacity: 0.6;
    border-bottom: 3px solid transparent;
    transition: all 0.3s;
}

.tab-room:hover {
    opacity: 1;
}

.tab-room.active {
    opacity: 1;
    border-bottom-color: white;
}

.tab-content-room {
    display: none;
}

.tab-content-room.active {
    display: block;
}
</style>


<div id="roomAdminSection" class="room-admin-section">
    <h2>🏠 Room Management (Admin)</h2>

    
    <div class="room-stats-grid">
        <div class="room-stat-card">
            <div class="room-stat-label">Total Rooms</div>
            <div class="room-stat-number" id="stat-total-rooms">0</div>
        </div>
        <div class="room-stat-card">
            <div class="room-stat-label">Full Rooms</div>
            <div class="room-stat-number" id="stat-full-rooms">0</div>
        </div>
        <div class="room-stat-card">
            <div class="room-stat-label">Available Rooms</div>
            <div class="room-stat-number" id="stat-available-rooms">0</div>
        </div>
        <div class="room-stat-card">
            <div class="room-stat-label">Occupancy Rate</div>
            <div class="room-stat-number" id="stat-occupancy-rate">0%</div>
        </div>
    </div>

    
    <div class="tabs-room">
        <button class="tab-room active" onclick="switchRoomTab('create')">➕ Create Room</button>
        <button class="tab-room" onclick="switchRoomTab('manage')">📋 Manage Rooms</button>
        <button class="tab-room" onclick="switchRoomTab('allocate')">👥 Allocate Student</button>
    </div>

    
    <div id="tab-create" class="tab-content-room active">
        <div class="room-form-section">
            <h3>Create New Room</h3>
            
            <div class="room-form-group">
                <div>
                    <label>Room Number</label>
                    <input type="text" id="createRoomNumber" placeholder="101, A101, etc.">
                </div>
                <div>
                    <label>Block</label>
                    <select id="createRoomBlock">
                        <option value="A">Block A</option>
                        <option value="B">Block B</option>
                        <option value="C">Block C</option>
                        <option value="D">Block D</option>
                        <option value="E">Block E</option>
                    </select>
                </div>
            </div>

            <div class="room-form-group">
                <div>
                    <label>Capacity</label>
                    <input type="number" id="createRoomCapacity" placeholder="2" min="1" max="10">
                </div>
                <div>
                    <label>Floor</label>
                    <input type="number" id="createRoomFloor" placeholder="1" min="1">
                </div>
            </div>

            <div class="room-form-group full">
                <div>
                    <label>Amenities (comma-separated)</label>
                    <input type="text" id="createRoomAmenities" placeholder="WiFi, Fan, AC, Bathroom">
                </div>
            </div>

            <div class="room-form-group full">
                <div>
                    <label>Description</label>
                    <input type="text" id="createRoomDescription" placeholder="Room notes or special features">
                </div>
            </div>

            <div class="room-form-actions">
                <button class="room-btn room-btn-primary" onclick="createNewRoom()">Create Room</button>
                <button class="room-btn room-btn-secondary" onclick="clearCreateForm()">Clear</button>
            </div>

            <div id="createRoomMessage"></div>
        </div>
    </div>

    
    <div id="tab-manage" class="tab-content-room">
        <div style="margin: 20px 0;">
            <h3>All Rooms</h3>
            
            <div style="margin: 15px 0;">
                <button class="room-btn room-btn-secondary" onclick="loadAllRooms()" style="width: 150px;">
                    🔄 Refresh
                </button>
            </div>

            <div class="room-cards-grid" id="roomCardsContainer">
                <div style="grid-column: 1/-1; text-align: center; padding: 30px; opacity: 0.7;">
                    ⏳ Loading rooms...
                </div>
            </div>
        </div>
    </div>

    
    <div id="tab-allocate" class="tab-content-room">
        <div class="room-form-section">
            <h3>Allocate Room to Student</h3>
            
            <div class="room-form-group full">
                <div>
                    <label>Student ID (ObjectId)</label>
                    <input type="text" id="allocateStudentId" placeholder="Paste student ObjectId">
                </div>
            </div>

            <div class="room-form-group full">
                <div>
                    <label>Room ID (ObjectId)</label>
                    <input type="text" id="allocateRoomId" placeholder="Paste room ObjectId">
                </div>
            </div>

            <div class="room-form-actions">
                <button class="room-btn room-btn-primary" onclick="allocateStudentToRoom()">Allocate Room</button>
                <button class="room-btn room-btn-secondary" onclick="clearAllocateForm()">Clear</button>
            </div>

            <div id="allocateRoomMessage"></div>

            <h4 style="margin-top: 30px;">Available Rooms</h4>
            <table class="room-table">
                <thead>
                    <tr>
                        <th>Room Number</th>
                        <th>Block</th>
                        <th>Capacity</th>
                        <th>Occupied</th>
                        <th>Available</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="availableRoomsBody">
                    <tr>
                        <td colspan="6" style="text-align: center;">⏳ Loading...</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    
    <div style="font-size: 12px; opacity: 0.8; margin-top: 20px; padding: 10px; background: rgba(255, 255, 255, 0.05); border-radius: 6px;">
        🔄 Statistics auto-refresh every 30 seconds
    </div>
</div>


<script>
const API_URL = BASE_URL + "/api";


function switchRoomTab(tab) {
    document.querySelectorAll('.tab-content-room').forEach(el => el.classList.remove('active'));
    document.querySelectorAll('.tab-room').forEach(el => el.classList.remove('active'));

    document.getElementById(`tab-${tab}`).classList.add('active');
    event.target.classList.add('active');

    if (tab === 'manage') loadAllRooms();
    if (tab === 'allocate') loadAvailableRoomsForAllocation();
}


async function loadRoomStatistics() {
    try {
        const response = await fetch(`${API_URL}/rooms/stats/overview`);
        const data = await response.json();

        if (data.stats) {
            document.getElementById('stat-total-rooms').textContent = data.stats.totalRooms;
            document.getElementById('stat-full-rooms').textContent = data.stats.fullRooms;
            document.getElementById('stat-available-rooms').textContent = data.stats.availableRooms;
            document.getElementById('stat-occupancy-rate').textContent = data.stats.occupancyRate;
        }
    } catch (err) {
        console.error('Error loading statistics:', err);
    }
}


async function createNewRoom() {
    const roomNumber = document.getElementById('createRoomNumber').value;
    const block = document.getElementById('createRoomBlock').value;
    const capacity = parseInt(document.getElementById('createRoomCapacity').value);
    const floor = parseInt(document.getElementById('createRoomFloor').value) || 1;
    const amenitiesStr = document.getElementById('createRoomAmenities').value;
    const description = document.getElementById('createRoomDescription').value;

    const amenities = amenitiesStr ? amenitiesStr.split(',').map(a => a.trim()) : [];

    if (!roomNumber || !capacity) {
        showMessage('createRoomMessage', 'Please fill room number and capacity', 'error');
        return;
    }

    try {
        const response = await fetch(`${API_URL}/rooms/create`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ roomNumber, block, capacity, floor, amenities, description })
        });

        const data = await response.json();

        if (response.ok) {
            showMessage('createRoomMessage', '✅ Room created successfully!', 'success');
            clearCreateForm();
            loadRoomStatistics();
        } else {
            showMessage('createRoomMessage', `❌ ${data.message}`, 'error');
        }
    } catch (err) {
        showMessage('createRoomMessage', '❌ Error creating room', 'error');
    }
}


async function loadAllRooms() {
    try {
        const response = await fetch(`${API_URL}/rooms`);
        const data = await response.json();

        const container = document.getElementById('roomCardsContainer');

        if (!data.data || data.data.length === 0) {
            container.innerHTML = '<div style="grid-column: 1/-1; text-align: center; padding: 30px;">No rooms found</div>';
            return;
        }

        container.innerHTML = data.data.map(room => {
            const percentFull = (room.occupiedCount / room.capacity) * 100;
            const isFull = room.occupiedCount >= room.capacity;

            return `
                <div class="room-card">
                    <div class="room-number">${room.roomNumber}</div>
                    <div class="room-block">Block ${room.block} • Floor ${room.floor}</div>
                    
                    <div class="room-capacity-text">
                        <strong>${room.occupiedCount}/${room.capacity}</strong> students
                    </div>
                    <div class="room-capacity-bar">
                        <div class="room-capacity-fill" style="width: ${percentFull}%"></div>
                    </div>

                    ${isFull ? '<div style="color: #ef4444; font-size: 12px; margin: 8px 0;">🔴 FULL</div>' : ''}

                    <div style="font-size: 12px; opacity: 0.8; margin: 8px 0;">
                        Amenities: ${room.amenities.join(', ') || 'None'}
                    </div>

                    <div class="room-card-actions">
                        <button class="room-card-action-btn" onclick="viewRoomDetails('${room._id}')">
                            View
                        </button>
                        <button class="room-card-action-btn" onclick="editRoom('${room._id}')">
                            Edit
                        </button>
                    </div>
                </div>
            `;
        }).join('');

    } catch (err) {
        console.error('Error loading rooms:', err);
    }
}


async function loadAvailableRoomsForAllocation() {
    try {
        const response = await fetch(`${API_URL}/rooms/available/list`);
        const data = await response.json();

        const tbody = document.getElementById('availableRoomsBody');

        if (!data.data || data.data.length === 0) {
            tbody.innerHTML = '<tr><td colspan="6" style="text-align: center;">No available rooms</td></tr>';
            return;
        }

        tbody.innerHTML = data.data.map(room => `
            <tr>
                <td><strong>${room.roomNumber}</strong></td>
                <td>Block ${room.block}</td>
                <td>${room.capacity}</td>
                <td>${room.occupiedCount}</td>
                <td>${room.availableCapacity}</td>
                <td>
                    <button class="room-card-action-btn" onclick="selectRoomForAllocation('${room._id}')">
                        Select
                    </button>
                </td>
            </tr>
        `).join('');

    } catch (err) {
        console.error('Error loading available rooms:', err);
    }
}


function selectRoomForAllocation(roomId) {
    document.getElementById('allocateRoomId').value = roomId;
    document.getElementById('allocateStudentId').focus();
}


async function allocateStudentToRoom() {
    const studentId = document.getElementById('allocateStudentId').value;
    const roomId = document.getElementById('allocateRoomId').value;

    if (!studentId || !roomId) {
        showMessage('allocateRoomMessage', 'Please enter student ID and room ID', 'error');
        return;
    }

    try {
        const response = await fetch(`${API_URL}/rooms/allocate`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ studentId, roomId })
        });

        const data = await response.json();

        if (response.ok) {
            showMessage('allocateRoomMessage', `✅ Allocated to Room ${data.data.room.roomNumber}!`, 'success');
            clearAllocateForm();
            loadRoomStatistics();
        } else {
            showMessage('allocateRoomMessage', `❌ ${data.message}`, 'error');
        }
    } catch (err) {
        showMessage('allocateRoomMessage', '❌ Error allocating room', 'error');
    }
}


function showMessage(elementId, message, type) {
    const element = document.getElementById(elementId);
    element.innerHTML = `<div class="room-message ${type}">${message}</div>`;
}

function clearCreateForm() {
    document.getElementById('createRoomNumber').value = '';
    document.getElementById('createRoomCapacity').value = '';
    document.getElementById('createRoomFloor').value = '';
    document.getElementById('createRoomAmenities').value = '';
    document.getElementById('createRoomDescription').value = '';
    document.getElementById('createRoomMessage').innerHTML = '';
}

function clearAllocateForm() {
    document.getElementById('allocateStudentId').value = '';
    document.getElementById('allocateRoomId').value = '';
    document.getElementById('allocateRoomMessage').innerHTML = '';
}

function viewRoomDetails(roomId) {
    alert(`Room ID: ${roomId}`);
}

function editRoom(roomId) {
    alert(`Edit Room: ${roomId}`);
}


function autoRefreshRoomStats() {
    loadRoomStatistics();
    setInterval(() => {
        loadRoomStatistics();
    }, 30000); 
}


document.addEventListener('DOMContentLoaded', () => {
    autoRefreshRoomStats();
});
</script>
