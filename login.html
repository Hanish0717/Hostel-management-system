<!DOCTYPE html>
<html lang="en">
<head>
<script src="global.js"></script>
<meta charset="UTF-8">
<title>Login - Hostel Management System</title>
<link rel="stylesheet" href="theme.css?v=2">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: "Segoe UI", sans-serif;
}

body {
    background: linear-gradient(135deg, var(--bg-secondary) 0%, #ebf0fe 100%);
    color: var(--text-primary);
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 20px;
    transition: background 0.3s ease, color 0.3s ease;
}

[data-theme='dark'] body {
    background: linear-gradient(135deg, var(--bg-secondary) 0%, #1a1e36 100%);
}

.logo {
    text-align: center;
    margin-bottom: 24px;
}

.logo span {
    font-size: 28px;
    font-weight: 700;
    color: var(--text-primary);
}

.logo-icon {
    width: 48px;
    height: 48px;
    background: var(--primary-color);
    border-radius: 12px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    color: white;
    margin-right: 10px;
    box-shadow: 0 4px 10px rgba(93, 110, 240, 0.4);
}

.container {
    width: 100%;
    max-width: 400px;
    margin: 0 auto;
    transition: max-width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
}

@media (min-width: 768px) {
    .container.wide {
        max-width: 700px;
    }
}

.card {
    background: var(--card-bg);
    color: var(--text-primary);
    padding: 40px;
    border-radius: 24px;
    box-shadow: 0 10px 40px rgba(0, 0, 0, 0.08);
    transition: all 0.3s ease;
}

[data-theme='dark'] .card {
    box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
}

.card h2 {
    margin-bottom: 8px;
    font-size: 28px;
    font-weight: 700;
}

.card p {
    color: var(--text-secondary);
    margin-bottom: 24px;
    font-size: 15px;
}

.toggle {
    display: flex;
    background: var(--bg-tertiary);
    border-radius: 12px;
    padding: 4px;
    margin-bottom: 24px;
}

.toggle button {
    flex: 1;
    padding: 10px;
    border: none;
    background: transparent;
    cursor: pointer;
    border-radius: 10px;
    font-weight: 500;
    color: var(--text-secondary);
    transition: all 0.3s ease;
}

.toggle button.active {
    background: var(--card-bg);
    color: var(--primary-color);
    font-weight: 600;
    box-shadow: 0 2px 8px rgba(0,0,0,0.05);
}

.form-group {
    margin-bottom: 18px;
}

label {
    display: block;
    margin-bottom: 6px;
    font-weight: 500;
    font-size: 14px;
    color: var(--text-primary);
}

input, select {
    width: 100%;
    padding: 12px 16px;
    border: 1px solid var(--border-color);
    border-radius: 10px;
    background: var(--input-bg);
    color: var(--text-primary);
    font-size: 15px;
    transition: all 0.3s ease;
}

input:focus, select:focus {
    border-color: var(--primary-color);
    outline: none;
    box-shadow: 0 0 0 4px var(--primary-light, rgba(93, 110, 240, 0.2));
    transform: translateY(-1px);
}

.row {
    display: flex;
    flex-direction: column;
    gap: 0;
}

@media (min-width: 768px) {
    .row {
        flex-direction: row;
        gap: 20px;
    }
}

.row .form-group {
    flex: 1;
}

.btn {
    width: 100%;
    padding: 14px;
    background: var(--primary-color);
    color: white;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    font-size: 16px;
    font-weight: 600;
    transition: all 0.3s ease;
    margin-top: 10px;
}

.btn:hover {
    background: var(--primary-hover);
    transform: translateY(-2px);
    box-shadow: 0 6px 15px rgba(93, 110, 240, 0.3);
}

.note {
    margin-top: 16px;
    font-size: 13px;
    color: var(--text-secondary);
    text-align: center;
}

.hidden {
    display: none;
}

.dynamic-field {
    transition: max-height 0.4s ease, opacity 0.4s ease, margin 0.4s ease;
    max-height: 100px;
    opacity: 1;
    overflow: hidden;
}

.dynamic-hidden {
    max-height: 0 !important;
    opacity: 0 !important;
    margin-bottom: 0 !important;
    pointer-events: none;
    border: none;
}

.theme-toggle {
    position: absolute;
    top: 20px;
    right: 20px;
    padding: 10px 15px;
    background: var(--primary-color);
    color: white;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    font-size: 18px;
    transition: all 0.3s ease;
    box-shadow: 0 4px 10px rgba(93, 110, 240, 0.3);
}

.theme-toggle:hover {
    background: var(--primary-hover);
    transform: scale(1.05);
}
</style>
</head>

<body>

<div class="container">

    <div class="logo">
        <div class="logo-icon">🏨</div>
        <span>Hostel Management System</span>
    </div>

    <div class="card">

        <h2>Welcome</h2>
        <p>Manage your hostel life in one place.</p>

        
        <div class="toggle">
            <button id="loginTab" class="active" onclick="showLogin()">Sign in</button>
            <button id="signupTab" onclick="showSignup()">Sign up</button>
        </div>

        
        <form id="loginForm">
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="loginEmail" pattern=".+@gmail\.com" title="Please enter a valid @gmail.com address" required>
            </div>

            <div class="form-group">
                <label>Password</label>
                <input type="password" id="loginPassword" required>
            </div>

            <button class="btn">Sign in</button>
        </form>

        
        <form id="signupForm" class="hidden">

            <div class="form-group">
                <label>Full Name</label>
                <input type="text" id="fullName" pattern="[A-Za-z\s\-]{3,50}" title="Name must be 3-50 characters, only letters, spaces, and hyphens" required>
            </div>

            <div class="form-group">
                <label>Role</label>
                <select id="role">
                    <option value="student">Student</option>
                    <option value="admin">Admin</option>
                </select>
            </div>

            <div class="row">
                <div class="form-group">
                    <label id="idLabel">Student ID</label>
                    <input type="text" id="studentId" pattern="STU[0-9]{3,6}" title="Format: STU followed by 3-6 digits (e.g., STU001)" placeholder="STU001" required>
                </div>

                <div class="form-group">
                    <label>Phone</label>
                    <input type="text" id="phone" pattern="[0-9]{10}" title="Phone number must be exactly 10 digits" required>
                </div>
            </div>

            <div class="form-group">
                <label>Email</label>
                <input type="email" id="signupEmail" pattern=".+@gmail\.com" title="Please enter a valid @gmail.com address" required>
            </div>

            <div class="form-group">
                <label>Password</label>
                <input type="password" id="signupPassword" pattern="(?=.*\d)(?=.*[a-z])(?=.*[A-Z])(?=.*[!@#$%^&*()_\-+=]).{8,}" title="Must contain at least 8 chars, 1 uppercase, 1 lowercase, 1 number, and 1 special character" required>
            </div>

            <button class="btn">Create account</button>

            <div class="note">
                New accounts default to Student role. Admins can promote to Warden or Admin.
            </div>

        </form>

    </div>

</div>

<script>
document.addEventListener("DOMContentLoaded", () => {
    const params = new URLSearchParams(window.location.search);
    if (params.get("tab") === "signup") {
        showSignup();
    } else {
        showLogin();
    }
});
function showLogin() {
    document.getElementById("loginForm").classList.remove("hidden");
    document.getElementById("signupForm").classList.add("hidden");

    document.getElementById("loginTab").classList.add("active");
    document.getElementById("signupTab").classList.remove("active");
    
    document.querySelector(".container").classList.remove("wide");
}

function showSignup() {
    document.getElementById("signupForm").classList.remove("hidden");
    document.getElementById("loginForm").classList.add("hidden");

    document.getElementById("signupTab").classList.add("active");
    document.getElementById("loginTab").classList.remove("active");
    
    document.querySelector(".container").classList.add("wide");
}


document.getElementById("loginForm").addEventListener("submit", async (e) => {
    e.preventDefault();

    const email = document.getElementById("loginEmail").value;
    const password = document.getElementById("loginPassword").value;

    
    if (email === "admin@gmail.com" && password === "admin123") {

        const adminUser = {
            name: "Admin",
            role: "admin"
        };

        localStorage.setItem("user", JSON.stringify(adminUser));

        alert("Admin Login Successful ✅");

        window.location.href = "admindashboard.html";
        return;
    }

    
    if (email === "warden@gmail.com" && password === "warden123") {

        const wardenUser = {
            name: "Warden",
            role: "warden"
        };

        localStorage.setItem("user", JSON.stringify(wardenUser));

        alert("Warden Login Successful ✅");

        window.location.href = "wardendashboard.html";
        return;
    }

    
    try {
        const res = await fetch(`${BASE_URL}/api/auth/login`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ email, password })
        });

        const data = await res.json();

        console.log("LOGIN RESPONSE:", data);

        if (res.ok) {
            alert("Login Successful ✅");

            const userData = data.data || data.user;
            if (!userData) {
                alert("User data missing ❌");
                return;
            }

            localStorage.setItem("user", JSON.stringify({
                _id: userData.userId || userData._id,
                name: userData.name || userData.fullName,
                role: userData.role || "student"
            }));

            
            if (userData.role === "admin") {
                window.location.href = "admindashboard.html";
            } else if (userData.role === "warden") {
                window.location.href = "wardendashboard.html";
            } else {
                window.location.href = "studentdashboard.html";
            }
            return;

        } else {
            alert(data.message);
        }

    } catch (err) {
        console.error("Login fetch error:", err);
        await safeFetchCheck(document.querySelector("#loginForm .btn"));
    }
});


document.getElementById("role").addEventListener("change", function(e) {
    const role = e.target.value;
    const idLabel = document.getElementById("idLabel");
    const idInput = document.getElementById("studentId");
    
    idInput.value = "";
    
    if (role === "admin") {
        idLabel.textContent = "Admin ID";
        idInput.pattern = "ADM[0-9]{3,6}";
        idInput.title = "Format: ADM followed by 3-6 digits (e.g., ADM001)";
        idInput.placeholder = "ADM001";
    } else {
        idLabel.textContent = "Student ID";
        idInput.pattern = "STU[0-9]{3,6}";
        idInput.title = "Format: STU followed by 3-6 digits (e.g., STU001)";
        idInput.placeholder = "STU001";
    }
});

document.getElementById("signupForm").addEventListener("submit", async (e) => {
    e.preventDefault();

    const fullName = document.getElementById("fullName").value.trim();
    const studentId = document.getElementById("studentId").value.trim();
    const phone = document.getElementById("phone").value.trim();
    const email = document.getElementById("signupEmail").value.trim();
    const password = document.getElementById("signupPassword").value;
    const role = document.getElementById("role").value;

    const payload = { fullName, email, password, role };
    if (role === "student") {
        payload.studentId = studentId;
        payload.phone = phone;
    } else if (role === "warden") {
        payload.phone = phone;
    }

    console.log("Registration Payload:", payload);

    try {
        const res = await fetch(`${BASE_URL}/api/auth/register`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload)
        });

        const data = await res.json();
        console.log("Registration Response:", data);

        if (res.ok) {
            alert(data.message || "Registration Successful ✅");
            showLogin();
        } else {
            alert(data.message || "Registration Failed ❌");
        }

    } catch (err) {
        console.error("Registration fetch error:", err);
        await safeFetchCheck(document.querySelector("#signupForm .btn"));
    }
});
</script>
<script src="theme.js"></script>
</body>
</html>
