<h1>Admin Dashboard</h1>
<p>Welcome Admin</p>

<button onclick="logout()">Logout</button>

<script>

const user = JSON.parse(localStorage.getItem("user"));

if (!user || user.role !== "admin") {
    window.location.href = "login.html";
}

function logout() {
    localStorage.removeItem("user");
    window.location.href = "login.html";
}
</script>
