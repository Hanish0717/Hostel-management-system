<!DOCTYPE html>
<html lang="en">
<head>
<script src="global.js"></script>
<meta charset="UTF-8">
<title>My Profile</title>
<link rel="stylesheet" href="theme.css">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: "Segoe UI", sans-serif;
}

body {
    display: flex;
    background: var(--bg-secondary);
    color: var(--text-primary);
    transition: background 0.3s ease, color 0.3s ease;
}


.sidebar {
    width: 230px;
    height: 100vh;
    background: var(--primary-color);
    color: white;
    transition: background 0.3s ease;
    padding: 20px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
}

.logo {
    font-size: 20px;
    font-weight: bold;
    margin-bottom: 30px;
}

.menu a {
    display: block;
    padding: 10px;
    margin: 8px 0;
    color: #cbd5e1;
    text-decoration: none;
    border-radius: 8px;
}

.menu a:hover,
.active {
    background: #1e2a52;
    color: white;
}


.main {
    flex: 1;
    padding: 30px;
}

.header h1 {
    margin-bottom: 5px;
}

.header p {
    color: gray;
    margin-bottom: 20px;
}


.card {
    background: white;
    padding: 25px;
    border-radius: 12px;
}


.form-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 20px;
}

.form-group {
    display: flex;
    flex-direction: column;
}

.form-group label {
    margin-bottom: 5px;
}

.form-group input {
    padding: 10px;
    border: 1px solid #ddd;
    border-radius: 8px;
}


.full {
    grid-column: span 2;
}


.btn {
    margin-top: 20px;
    padding: 12px;
    background: #4f6df5;
    color: white;
    border: none;
    border-radius: 8px;
    cursor: pointer;
}


.bottom {
    font-size: 14px;
}

.logout {
    margin-top: 10px;
    cursor: pointer;
}
</style>
</head>

<body>




<div class="sidebar">
    <div>
        <div class="logo">🏨 Hostel Management System</div>

        <div class="menu">
            <a href="studentdashboard.html">Dashboard</a>
            <a href="profile.html" class="active">My Profile</a>
            <a>My Food QR</a>
            <a>Attendance</a>
            <a>Outings</a>
            <a>Complaints</a>
        </div>
    </div>

    <div class="bottom">
        <div id="userEmail"></div>
        <div class="logout" onclick="logout()">Sign out</div>
    </div>
</div>


<div class="main">

    <div class="header">
        <h1>My Profile</h1>
        <p>Keep your details up to date.</p>
    </div>

    <div class="card">

        <h2>Personal information</h2>

        <div class="form-grid">

            <div class="form-group">
                <label>Full name</label>
                <input type="text" id="name">
            </div>

            <div class="form-group">
                <label>Student ID</label>
                <input type="text" id="studentId">
            </div>

            <div class="form-group">
                <label>Phone</label>
                <input type="text" id="phone">
            </div>

            <div class="form-group">
                <label>Course</label>
                <input type="text" id="course">
            </div>

            <div class="form-group">
                <label>Year of study</label>
                <input type="text" id="year">
            </div>

            <div class="form-group">
                <label>Date of birth</label>
                <input type="date" id="dob">
            </div>

            <div class="form-group">
                <label>Guardian name</label>
                <input type="text" id="guardian">
            </div>

            <div class="form-group">
                <label>Guardian phone</label>
                <input type="text" id="guardianPhone">
            </div>

            <div class="form-group full">
                <label>Address</label>
                <input type="text" id="address">
            </div>

        </div>

        <button class="btn" onclick="saveProfile()">Save changes</button>

    </div>

</div>

<script>

const user = JSON.parse(localStorage.getItem("user"));

if (!user) {
    window.location.href = "login.html";
}


document.getElementById("userEmail").innerText = user.name;


function saveProfile() {
    const profile = {
        name: document.getElementById("name").value,
        studentId: document.getElementById("studentId").value,
        phone: document.getElementById("phone").value
    };

    localStorage.setItem("profile", JSON.stringify(profile));

    alert("Profile Saved ✅");
}


function logout() {
    localStorage.removeItem("user");
    window.location.href = "login.html";
}
</script>
<script src="theme.js"></script>
</body>
</html>
